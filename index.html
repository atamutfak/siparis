<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ata Mutfak - Sipariş Paneli</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        :root { --p-color: #d35400; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .container { max-width: 500px; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: auto; }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .person-card { border: 1px solid #eee; padding: 20px; border-radius: 15px; margin-bottom: 20px; background: #fdfdfd; position: relative; }
        .person-label { position: absolute; top: -12px; left: 15px; background: var(--p-color); color: white; padding: 3px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #444; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; outline: none; }
        .btn { width: 100%; background: #25D366; color: #fff; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #loading { text-align: center; color: var(--p-color); padding: 40px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color:var(--p-color); margin:0;">ATA MUTFAK</h2>
        <p style="margin:5px 0; color:#666;">Günlük Tabldot Sipariş Formu</p>
    </div>

    <div id="loading">Menü Hazırlanıyor...</div>

    <form id="mainForm" style="display:none;">
        <div class="input-group">
            <label>Ad Soyad *</label>
            <input type="text" id="custName" required placeholder="Adınız Soyadınız">
        </div>
        <div class="input-group">
            <label>Teslimat Adresi *</label>
            <textarea id="custAddress" rows="2" required placeholder="Adres Bilgileriniz"></textarea>
        </div>
        <div class="input-group">
            <label>Kaç Kişilik Menü? *</label>
            <select id="personCount" onchange="generateForms()">
                <option value="1">1 Kişilik</option>
                <option value="2">2 Kişilik</option>
                <option value="3">3 Kişilik</option>
                <option value="4">4 Kişilik</option>
                <option value="5">5 Kişilik</option>
            </select>
        </div>

        <div id="dynamicPersons"></div>

        <button type="button" class="btn" onclick="sendOrder()">SİPARİŞİ WHATSAPP'A GÖNDER</button>
    </form>
</div>

<script>
    const SHEET_ID = '1Tym9AWjTN-2WT4POrdRb2TWyCSZq1kTB2rPcUy_NF_o';
    // Görseldeki tablo yapısına göre doğrudan JSON verisi çeken yeni adres:
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    let menu = { corba: [], ana: [], yan: [], ek: [] };

    async function getMenu() {
        try {
            const resp = await fetch(URL);
            const rawText = await resp.text();
            
            // Google'ın gönderdiği gereksiz metinleri temizleyip saf JSON alıyoruz
            const jsonData = JSON.parse(rawText.substring(47, rawText.length - 2));
            const rows = jsonData.table.rows;

            rows.forEach((row, index) => {
                // İlk satır başlık değilse (görselde A1'de başlık var, onu atlıyoruz)
                if (index === 0) return;

                if (row.c[0]) menu.corba.push(row.c[0].v);
                if (row.c[1]) menu.ana.push(row.c[1].v);
                if (row.c[2]) menu.yan.push(row.c[2].v);
                if (row.c[3]) menu.ek.push(row.c[3].v);
            });

            if(menu.corba.length > 0 || menu.ana.length > 0) {
                $("#loading").hide();
                $("#mainForm").show();
                generateForms();
            } else {
                $("#loading").text("Hata: Tabloda veri bulunamadı.");
            }
        } catch (err) {
            console.error(err);
            $("#loading").html("Bağlantı Hatası!<br><small>Lütfen Google Sheets Paylaşım ayarlarını kontrol edin.</small>");
        }
    }

    function generateForms() {
        const count = $("#personCount").val();
        const container = $("#dynamicPersons");
        container.empty();

        for(let i = 1; i <= count; i++) {
            container.append(`
                <div class="person-card">
                    <span class="person-label">${i}. KİŞİ</span>
                    <div class="input-group">
                        <label>Çorba</label>
                        <select class="p-corba">${menu.corba.map(x => `<option value="${x}">${x}</option>`).join('')}</select>
                    </div>
                    <div class="input-group">
                        <label>Ana Yemek</label>
                        <select class="p-ana">${menu.ana.map(x => `<option value="${x}">${x}</option>`).join('')}</select>
                    </div>
                    <div class="input-group">
                        <label>Yan Lezzet</label>
                        <select class="p-yan">${menu.yan.map(x => `<option value="${x}">${x}</option>`).join('')}</select>
                    </div>
                    <div class="input-group">
                        <label>İçecek / Ek</label>
                        <select class="p-ek">${menu.ek.map(x => `<option value="${x}">${x}</option>`).join('')}</select>
                    </div>
                </div>
            `);
        }
    }

    function sendOrder() {
        const name = $("#custName").val();
        const addr = $("#custAddress").val();
        if(!name || !addr) { alert("Lütfen eksik alanları doldurun."); return; }

        let msg = `*YENİ SİPARİŞ (Ata Mutfak)*\n👤 *Müşteri:* ${name}\n📍 *Adres:* ${addr}\n----------\n`;
        $(".person-card").each(function(i) {
            msg += `*${i+1}. Kişi:* ${$(this).find(".p-corba").val()}, ${$(this).find(".p-ana").val()}, ${$(this).find(".p-yan").val()}, ${$(this).find(".p-ek").val()}\n`;
        });

        window.location.href = "https://wa.me/905077476114?text=" + encodeURIComponent(msg);
    }

    $(document).ready(() => getMenu());
</script>
</body>
</html>
