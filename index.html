<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ata Mutfak - Sipariş Paneli</title>
  <style>
    :root {
      --p-color: #d35400;
      --bg-color: #f8f9fa;
      --text-color: #2c3e50;
      --border-color: #e5e7eb;
      --error-bg: #fff3f3;
      --error-text: #b00020;
      --success-color: #25d366;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 15px;
      color: var(--text-color);
    }

    .container {
      max-width: 640px;
      background: #ffffff;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      margin: 20px auto;
    }

    .header {
      text-align: center;
      border-bottom: 2px solid #f1f1f1;
      margin-bottom: 24px;
      padding-bottom: 12px;
    }

    .header h2 {
      margin: 0;
      color: var(--p-color);
      font-size: 28px;
    }

    .header p {
      margin: 8px 0 0;
      color: #666;
      font-size: 15px;
    }

    #loading {
      text-align: center;
      padding: 20px;
      color: var(--p-color);
      font-weight: 600;
      font-size: 16px;
    }

    #errorBox {
      display: none;
      margin: 16px 0;
      padding: 14px;
      border-radius: 12px;
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #f3b7bf;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-line;
    }

    form {
      display: none;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 14px;
      color: #555;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #dcdcdc;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .person-card {
      background: #fff;
      border: 1px solid #eee;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      position: relative;
    }

    .person-number {
      position: absolute;
      top: -12px;
      left: 15px;
      background: var(--p-color);
      color: #fff;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .kvkk {
      font-size: 12px;
      color: #7f8c8d;
      margin-top: 12px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .kvkk input {
      width: auto;
      margin-top: 2px;
    }

    .btn {
      width: 100%;
      background: var(--success-color);
      color: #fff;
      border: none;
      padding: 17px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
    }

    .btn:hover {
      opacity: 0.95;
    }

    .debug-box {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: #f7f7f7;
      color: #555;
      font-size: 12px;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 600px) {
      .container {
        padding: 18px;
        margin: 10px auto;
      }

      .menu-grid {
        grid-template-columns: 1fr;
      }

      .header h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>ATA MUTFAK</h2>
      <p>Günlük Tabldot Sipariş</p>
    </div>

    <div id="loading">Menü E-Tablo'dan yükleniyor...</div>
    <div id="errorBox"></div>
    <div id="debugBox" class="debug-box"></div>

    <form id="mainForm">
      <div class="input-group">
        <label for="custName">Ad Soyad *</label>
        <input type="text" id="custName" required placeholder="İsminiz" />
      </div>

      <div class="input-group">
        <label for="custPhone">Telefon *</label>
        <input type="tel" id="custPhone" required placeholder="05xx xxx xx xx" />
      </div>

      <div class="input-group">
        <label for="custAddress">Teslimat Adresi *</label>
        <textarea id="custAddress" required placeholder="Adresiniz"></textarea>
      </div>

      <div class="input-group">
        <label for="personCount">Kaç Kişilik Menü? *</label>
        <select id="personCount">
          <option value="1">1 Kişilik</option>
          <option value="2">2 Kişilik</option>
          <option value="3">3 Kişilik</option>
          <option value="4">4 Kişilik</option>
          <option value="5">5 Kişilik</option>
        </select>
      </div>

      <div id="dynamicPersons"></div>

      <label class="kvkk">
        <input type="checkbox" id="kvkkCheck" required />
        <span>KVKK kapsamında verilerimin işlenmesini kabul ediyorum.</span>
      </label>

      <button type="button" class="btn" id="sendBtn">SİPARİŞİ WHATSAPP'A GÖNDER</button>
    </form>
  </div>

  <script>
    const SHEET_ID = '1Tym9AWjTN-2WT4POrdRb2TWYcSZq1kTB2rPcUy_NF_o';
    const SHEET_GID = '0';
    const WHATSAPP_NUMBER = '905077476114';
    const MENU_PRICE_PER_PERSON = 200;

    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;

    const menuData = {
      corbalar: [],
      anaYemekler: [],
      yanlar: [],
      icecekler: []
    };

    const loadingEl = document.getElementById('loading');
    const errorBoxEl = document.getElementById('errorBox');
    const debugBoxEl = document.getElementById('debugBox');
    const mainFormEl = document.getElementById('mainForm');
    const personCountEl = document.getElementById('personCount');
    const dynamicPersonsEl = document.getElementById('dynamicPersons');
    const sendBtnEl = document.getElementById('sendBtn');

    function showError(message, debugText = '') {
      loadingEl.style.display = 'none';
      mainFormEl.style.display = 'none';
      errorBoxEl.style.display = 'block';
      errorBoxEl.textContent = message;

      if (debugText) {
        debugBoxEl.style.display = 'block';
        debugBoxEl.textContent = debugText;
      }
    }

    function showForm() {
      loadingEl.style.display = 'none';
      errorBoxEl.style.display = 'none';
      debugBoxEl.style.display = 'none';
      mainFormEl.style.display = 'block';
    }

    function parseCsvLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }

      result.push(current);

      return result.map(cell => cell.replace(/^"|"$/g, '').trim());
    }

    function uniqueClean(arr) {
      return [...new Set(arr.map(x => (x || '').trim()).filter(Boolean))];
    }

    function createOptions(options) {
      if (!options.length) {
        return '<option value="">Seçenek bulunamadı</option>';
      }
      return options.map(item => `<option value="${escapeHtml(item)}">${escapeHtml(item)}</option>`).join('');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function generateForms() {
      const count = Number(personCountEl.value);
      dynamicPersonsEl.innerHTML = '';

      for (let i = 1; i <= count; i++) {
        const card = document.createElement('div');
        card.className = 'person-card';

        card.innerHTML = `
          <span class="person-number">${i}. Kişi</span>
          <div class="menu-grid">
            <div class="input-group">
              <label>Çorba</label>
              <select class="p-corba" required>${createOptions(menuData.corbalar)}</select>
            </div>
            <div class="input-group">
              <label>Ana Yemek</label>
              <select class="p-ana" required>${createOptions(menuData.anaYemekler)}</select>
            </div>
            <div class="input-group">
              <label>Yan Lezzet</label>
              <select class="p-yan" required>${createOptions(menuData.yanlar)}</select>
            </div>
            <div class="input-group">
              <label>İçecek</label>
              <select class="p-ek" required>${createOptions(menuData.icecekler)}</select>
            </div>
          </div>
        `;

        dynamicPersonsEl.appendChild(card);
      }
    }

    async function getMenu() {
      try {
        const response = await fetch(SHEET_URL, { method: 'GET' });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const csvText = await response.text();

        if (!csvText || !csvText.trim()) {
          throw new Error('CSV boş döndü.');
        }

        const rows = csvText
          .split(/\r?\n/)
          .map(r => r.trim())
          .filter(Boolean);

        if (rows.length < 2) {
          throw new Error('Başlık dışında veri satırı bulunamadı.');
        }

        const dataRows = rows.slice(1);

        dataRows.forEach(row => {
          const cols = parseCsvLine(row);

          if (cols[0]) menuData.corbalar.push(cols[0]);
          if (cols[1]) menuData.anaYemekler.push(cols[1]);
          if (cols[2]) menuData.yanlar.push(cols[2]);
          if (cols[3]) menuData.icecekler.push(cols[3]);
        });

        menuData.corbalar = uniqueClean(menuData.corbalar);
        menuData.anaYemekler = uniqueClean(menuData.anaYemekler);
        menuData.yanlar = uniqueClean(menuData.yanlar);
        menuData.icecekler = uniqueClean(menuData.icecekler);

        if (
          menuData.corbalar.length === 0 ||
          menuData.anaYemekler.length === 0 ||
          menuData.yanlar.length === 0 ||
          menuData.icecekler.length === 0
        ) {
          throw new Error(
            'Menü sütunlarından biri boş görünüyor.\n' +
            'Beklenen sıra:\n' +
            '1. sütun = Çorba\n' +
            '2. sütun = Ana Yemek\n' +
            '3. sütun = Yan Lezzet\n' +
            '4. sütun = İçecek'
          );
        }

        showForm();
        generateForms();
      } catch (error) {
        showError(
          'Tabloya erişilemedi veya veriler okunamadı. Lütfen tablo paylaşımını, gid değerini ve sütun düzenini kontrol edin.',
          `Hata detayı: ${error.message}\n\nKullanılan URL:\n${SHEET_URL}`
        );
        console.error('Menu load error:', error);
      }
    }

    function sendOrder() {
      if (!mainFormEl.reportValidity()) {
        return;
      }

      const name = document.getElementById('custName').value.trim();
      const phone = document.getElementById('custPhone').value.trim();
      const address = document.getElementById('custAddress').value.trim();
      const count = Number(personCountEl.value);

      let msg = `*YENİ SİPARİŞ (Ata Mutfak)*\n`;
      msg += `👤 *Müşteri:* ${name}\n`;
      msg += `📞 *Telefon:* ${phone}\n`;
      msg += `📍 *Adres:* ${address}\n`;
      msg += `👥 *Kişi Sayısı:* ${count}\n`;
      msg += `💵 *Tutar:* ${count * MENU_PRICE_PER_PERSON} TL\n`;
      msg += `--------------------------\n`;

      const personCards = document.querySelectorAll('.person-card');

      personCards.forEach((card, index) => {
        const corba = card.querySelector('.p-corba')?.value || '';
        const ana = card.querySelector('.p-ana')?.value || '';
        const yan = card.querySelector('.p-yan')?.value || '';
        const ek = card.querySelector('.p-ek')?.value || '';

        msg += `*${index + 1}. Kişi:* ${corba}, ${ana}, ${yan}, ${ek}\n`;
      });

      const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
      window.location.href = waUrl;
    }

    personCountEl.addEventListener('change', generateForms);
    sendBtnEl.addEventListener('click', sendOrder);
    document.addEventListener('DOMContentLoaded', getMenu);
  </script>
</body>
</html>
