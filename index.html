<script>
    const SHEET_ID = '1Tym9AWjTN-2WT4POrdRb2TWYcSZq1kTB2rPcUy_NF_o';
    const SHEET_GID = '0';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${SHEET_GID}`;

    let menuData = { corbalar: [], anaYemekler: [], yanlar: [], icecekler: [] };

    async function getMenu() {
        try {
            const response = await fetch(SHEET_URL);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "");

            rows.slice(1).forEach(row => {
                const cols = row
                    .split(/[,;](?=(?:(?:[^"]*"){2})*[^"]*$)/)
                    .map(c => c.replace(/^"|"$/g, '').trim());

                if (cols[0]) menuData.corbalar.push(cols[0]);
                if (cols[1]) menuData.anaYemekler.push(cols[1]);
                if (cols[2]) menuData.yanlar.push(cols[2]);
                if (cols[3]) menuData.icecekler.push(cols[3]);
            });

            if (menuData.corbalar.length > 0) {
                $("#loading").hide();
                $("#mainForm").show();
                generateForms();
            } else {
                $("#loading").text("Tablo boş veya tablo paylaşımı/yayın ayarı kapalı.");
            }
        } catch (e) {
            console.error("Sheet fetch error:", e);
            $("#loading").text("Hata: Tabloya erişilemedi.");
        }
    }

    $(document).ready(() => getMenu());
</script>
