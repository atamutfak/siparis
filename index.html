<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ata Mutfak Sipariş Formu</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin: auto; }
        h2 { color: #d35400; text-align: center; margin-bottom: 5px; }
        .price { text-align: center; font-weight: bold; color: #7f8c8d; margin-bottom: 20px; }
        .section-title { font-weight: bold; margin-top: 20px; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 5px; display: block; }
        
        .input-group { margin-top: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9em; font-weight: bold; }
        .input-group input, .input-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .option { background: #fff; margin: 10px 0; padding: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; border: 1px solid #eee; transition: 0.3s; }
        .option:hover { background: #fffbf0; border-color: #f39c12; }
        .option input { margin-right: 15px; accent-color: #f39c12; }
        
        .kvkk-area { margin-top: 20px; font-size: 0.8em; color: #7f8c8d; background: #fdfdfd; padding: 10px; border-radius: 5px; border: 1px inset #eee; }
        .btn { width: 100%; background: #25D366; color: white; border: none; padding: 18px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        .footer-info { text-align: center; font-size: 0.8em; color: #bdc3c7; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ATA MUTFAK</h2>
    <p class="price">Günlük Tabldot Menü: 200₺</p>

    <form id="orderForm">
        <div class="input-group">
            <label>Ad Soyad *</label>
            <input type="text" name="ad" placeholder="Adınız ve Soyadınız" required>
        </div>
        <div class="input-group">
            <label>Teslimat Adresi *</label>
            <textarea name="adres" rows="2" placeholder="Mahalle, Sokak, No, Kat/Daire" required></textarea>
        </div>
        <div class="input-group">
            <label>Kaç Kişilik Sipariş? *</label>
            <input type="number" name="adet" value="1" min="1" required style="width: 80px;">
        </div>

        <span class="section-title">🥣 ÇORBALAR</span>
        <label class="option"><input type="radio" name="corba" value="Domates Çorbası" required> Domates Çorbası</label>
        <label class="option"><input type="radio" name="corba" value="Mercimek Çorbası"> Mercimek Çorbası</label>

        <span class="section-title">🍖 ANA YEMEKLER</span>
        <label class="option"><input type="radio" name="ana" value="Püreli Tavuk" required> Püreli Tavuk</label>
        <label class="option"><input type="radio" name="ana" value="Patlıcan Musakka"> Patlıcan Musakka</label>
        <label class="option"><input type="radio" name="ana" value="Tavuk Fajita"> Tavuk Fajita</label>

        <span class="section-title">🍚 YAN LEZZETLER</span>
        <label class="option"><input type="radio" name="yan" value="Pirinç Pilavı" required> Pirinç Pilavı</label>
        <label class="option"><input type="radio" name="yan" value="Bulgur Pilavı"> Bulgur Pilavı</label>

        <span class="section-title">🥤 İÇECEK / EK</span>
        <label class="option"><input type="radio" name="ek" value="Cacık" required> Cacık</label>
        <label class="option"><input type="radio" name="ek" value="Salata"> Salata</label>
        <label class="option"><input type="radio" name="ek" value="Ayran"> Ayran</label>

        <div class="kvkk-area">
            <label>
                <input type="checkbox" required> 
                Paylaştığım verilerin sipariş takibi amacıyla işlenmesini ve iletişim kurulmasını KVKK kapsamında kabul ediyorum.
            </label>
        </div>

        <button type="button" class="btn" onclick="sendWhatsApp()">SİPARİŞİ WHATSAPP'TAN GÖNDER</button>
    </form>
    <div class="footer-info">Ata Mutfak Esnaf Lokantası | 0 507 747 6114</div>
</div>

<script>
    function sendWhatsApp() {
        const form = document.getElementById('orderForm');
        if(!form.checkValidity()) {
            alert("Lütfen tüm zorunlu alanları doldurun ve KVKK onayını işaretleyin.");
            return;
        }

        const formData = new FormData(form);
        const adet = formData.get('adet');
        const toplamTutar = adet * 200;

        let mesaj = `*YENİ SİPARİŞ (Ata Mutfak)*\n`;
        mesaj += `--------------------------\n`;
        mesaj += `👤 *Müşteri:* ${formData.get('ad')}\n`;
        mesaj += `📍 *Adres:* ${formData.get('adres')}\n`;
        mesaj += `🍱 *Adet:* ${adet} Kişilik\n`;
        mesaj += `💰 *Toplam:* ${toplamTutar} TL\n`;
        mesaj += `--------------------------\n`;
        mesaj += `🥣 *Çorba:* ${formData.get('corba')}\n`;
        mesaj += `🍖 *Ana Yemek:* ${formData.get('ana')}\n`;
        mesaj += `🍚 *Yan Lezzet:* ${formData.get('yan')}\n`;
        mesaj += `🥤 *Ek:* ${formData.get('ek')}\n`;
        mesaj += `--------------------------\n`;
        mesaj += `_KVKK Onaylanmıştır._`;

        const telefon = "905077476114";
        window.location.href = "https://wa.me/" + telefon + "?text=" + encodeURIComponent(mesaj);
    }
</script>

</body>
</html>
