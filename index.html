<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ata Mutfak - Sipariş</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        :root { --p-color: #d35400; }
        body { font-family: sans-serif; background: #f8f9fa; padding: 10px; }
        .container { max-width: 500px; background: #fff; padding: 20px; border-radius: 15px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .person-card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #fafafa; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; background: #25D366; color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #loading { text-align: center; color: var(--p-color); padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color:var(--p-color); margin:0;">ATA MUTFAK</h2>
        <p>Hızlı Sipariş Sistemi</p>
    </div>

    <div id="loading">Menü yükleniyor...</div>

    <form id="mainForm" style="display:none;">
        <div class="input-group"><label>Ad Soyad *</label><input type="text" id="custName" required></div>
        <div class="input-group"><label>Adres *</label><textarea id="custAddress" required></textarea></div>
        <div class="input-group">
            <label>Kişi Sayısı *</label>
            <select id="personCount" onchange="generateForms()">
                <option value="1">1 Kişilik</option><option value="2">2 Kişilik</option><option value="3">3 Kişilik</option>
            </select>
        </div>
        <div id="dynamicPersons"></div>
        <button type="button" class="btn" onclick="sendOrder()">WHATSAPP'A GÖNDER</button>
    </form>
</div>

<script>
    const URL = `https://docs.google.com/spreadsheets/d/1Tym9AWjTN-2WT4POrdRb2TWyCSZq1kTB2rPcUy_NF_o/export?format=csv`;
    let menu = { corba: [], ana: [], yan: [], ek: [] };

    async function getMenu() {
        try {
            const resp = await fetch(URL);
            const text = await resp.text();
            const lines = text.split('\n').filter(l => l.trim() !== "");

            lines.slice(1).forEach(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                if(cols[0]) menu.corba.push(cols[0]);
                if(cols[1]) menu.ana.push(cols[1]);
                if(cols[2]) menu.yan.push(cols[2]);
                if(cols[3]) menu.ek.push(cols[3]);
            });

            if(menu.corba.length > 0) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainForm').style.display = 'block';
                generateForms();
            } else {
                document.getElementById('loading').innerText = "Hata: Tablo boş!";
            }
        } catch (err) {
            document.getElementById('loading').innerText = "Bağlantı Hatası!";
        }
    }

    function generateForms() {
        const count = document.getElementById('personCount').value;
        const container = document.getElementById('dynamicPersons');
        container.innerHTML = '';
        for(let i = 1; i <= count; i++) {
            container.innerHTML += `
                <div class="person-card">
                    <strong>${i}. Kişi</strong>
                    <div class="input-group"><label>Çorba</label><select class="p-corba">${menu.corba.map(x => `<option>${x}</option>`).join('')}</select></div>
                    <div class="input-group"><label>Ana Yemek</label><select class="p-ana">${menu.ana.map(x => `<option>${x}</option>`).join('')}</select></div>
                    <div class="input-group"><label>Yan Lezzet</label><select class="p-yan">${menu.yan.map(x => `<option>${x}</option>`).join('')}</select></div>
                    <div class="input-group"><label>İçecek</label><select class="p-ek">${menu.ek.map(x => `<option>${x}</option>`).join('')}</select></div>
                </div>`;
        }
    }

    function sendOrder() {
        const name = document.getElementById('custName').value;
        const addr = document.getElementById('custAddress').value;
        if(!name || !addr) { alert("Doldurunuz!"); return; }
        let msg = `*YENİ SİPARİŞ*\n*İsim:* ${name}\n*Adres:* ${addr}\n----------\n`;
        document.querySelectorAll('.person-card').forEach((card, i) => {
            msg += `${i+1}. Kişi: ${card.querySelector('.p-corba').value}, ${card.querySelector('.p-ana').value}, ${card.querySelector('.p-yan').value}, ${card.querySelector('.p-ek').value}\n`;
        });
        window.location.href = "https://wa.me/905077476114?text=" + encodeURIComponent(msg);
    }
    getMenu();
</script>
</body>
</html>
