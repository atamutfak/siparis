<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ata Mutfak - Sipariş Paneli</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        :root { --p-color: #d35400; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; }
        .container { max-width: 500px; background: #fff; padding: 25px; border-radius: 20px; margin: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .person-card { border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 15px; background: #fdfdfd; position: relative; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #666; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; background: #25D366; color: #fff; border: none; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #loading { text-align: center; color: var(--p-color); padding: 30px; font-weight: bold; }
        .error-msg { color: red; text-align: center; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="color:var(--p-color); margin:0;">ATA MUTFAK</h2>
        <p style="font-size: 14px; color: #888;">Günlük Sipariş Sistemi</p>
    </div>

    <div id="loading">
        <span>Menü E-Tablo'dan alınıyor...</span>
        <div id="debugInfo" class="error-msg"></div>
    </div>

    <form id="mainForm" style="display:none;">
        <div class="input-group">
            <label>Ad Soyad *</label>
            <input type="text" id="custName" required placeholder="İsminiz">
        </div>
        <div class="input-group">
            <label>Teslimat Adresi *</label>
            <textarea id="custAddress" required placeholder="Açık adresiniz"></textarea>
        </div>
        <div class="input-group">
            <label>Kaç Kişilik Sipariş? *</label>
            <select id="personCount" onchange="generateForms()">
                <option value="1">1 Kişilik</option>
                <option value="2">2 Kişilik</option>
                <option value="3">3 Kişilik</option>
                <option value="4">4 Kişilik</option>
                <option value="5">5 Kişilik</option>
            </select>
        </div>

        <div id="dynamicPersons"></div>

        <button type="button" class="btn" onclick="sendOrder()">SİPARİŞİ WHATSAPP'A GÖNDER</button>
    </form>
</div>

<script>
    // Tablo ID'niz
    const SHEET_ID = '1Tym9AWjTN-2WT4POrdRb2TWyCSZq1kTB2rPcUy_NF_o';
    // Daha güvenli bir veri çekme formatı (gviz tq)
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sayfa1`;

    let menu = { corba: [], ana: [], yan: [], ek: [] };

    async function getMenu() {
        const debug = document.getElementById('debugInfo');
        try {
            const resp = await fetch(URL);
            if (!resp.ok) throw new Error("Tabloya erişim reddedildi. Web'de yayınlamayı kontrol edin.");
            
            const text = await resp.text();
            const lines = text.split('\n');

            if (lines.length < 2) throw new Error("Tabloda veri bulunamadı.");

            for(let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(cols[0]) menu.corba.push(cols[0].replace(/"/g, ""));
                if(cols[1]) menu.ana.push(cols[1].replace(/"/g, ""));
                if(cols[2]) menu.yan.push(cols[2].replace(/"/g, ""));
                if(cols[3]) menu.ek.push(cols[3].replace(/"/g, ""));
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainForm').style.display = 'block';
            generateForms();

        } catch (err) {
            debug.innerText = "HATA: " + err.message + "\nLütfen Google Sheets'ten 'Web'de Yayınla' yapıldığından emin olun.";
        }
    }

    function generateForms() {
        const count = document.getElementById('personCount').value;
        const container = document.getElementById('dynamicPersons');
        container.innerHTML = '';

        for(let i = 1; i <= count; i++) {
            container.innerHTML += `
                <div class="person-card">
                    <strong style="font-size:12px; color:var(--p-color);">${i}. KİŞİ SEÇİMİ</strong>
                    <div class="input-group"><label>Çorba</label><select class="p-corba">${menu.corba.map(x => `<option>${x}</option>`).join('')}</select></div>
                    <div class="input-group"><label>Ana Yemek</label><select class="p-ana">${menu.ana.map(x => `<option>${x}</option>`).join('')}</select></div>
                    <div class="input-group"><label>Yan Lezzet</label><select class="p-yan">${menu.yan.map(x => `<option>${x}</option>`).join('')}</select></div>
                    <div class="input-group"><label>İçecek</label><select class="p-ek">${menu.ek.map(x => `<option>${x}</option>`).join('')}</select></div>
                </div>
            `;
        }
    }

    function sendOrder() {
        const name = document.getElementById('custName').value;
        const addr = document.getElementById('custAddress').value;
        const count = document.getElementById('personCount').value;

        if(!name || !addr) { alert("Lütfen isim ve adres alanlarını doldurun!"); return; }

        let msg = `*YENİ SİPARİŞ (Ata Mutfak)*\n👤 *Müşteri:* ${name}\n📍 *Adres:* ${addr}\n👥 *Kişi Sayısı:* ${count}\n----------\n`;
        
        document.querySelectorAll('.person-card').forEach((card, idx) => {
            msg += `*${idx+1}. Kişi:* ${card.querySelector('.p-corba').value}, ${card.querySelector('.p-ana').value}, ${card.querySelector('.p-yan').value}, ${card.querySelector('.p-ek').value}\n`;
        });

        window.location.href = "https://wa.me/905077476114?text=" + encodeURIComponent(msg);
    }

    getMenu();
</script>
</body>
</html>
