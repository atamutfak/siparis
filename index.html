<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ata Mutfak - Akıllı Sipariş</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        :root { --p-color: #d35400; --s-color: #273c75; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f1f2f6; margin: 0; padding: 10px; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: auto; }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .person-card { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        .person-number { position: absolute; top: -10px; left: 10px; background: var(--p-color); color: white; padding: 2px 10px; border-radius: 5px; font-size: 12px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        select { background: white; font-size: 14px; }
        .btn { width: 100%; background: #25D366; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .kvkk { font-size: 11px; color: #7f8c8d; margin-top: 10px; display: flex; align-items: flex-start; gap: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>ATA MUTFAK</h2>
        <p>Hızlı Sipariş Sistemi</p>
    </div>

    <form id="mainForm">
        <div class="input-group">
            <label>Ad Soyad *</label>
            <input type="text" id="custName" required placeholder="İsminiz">
        </div>
        <div class="input-group">
            <label>Teslimat Adresi *</label>
            <textarea id="custAddress" rows="2" required placeholder="Adresiniz"></textarea>
        </div>
        <div class="input-group">
            <label>Toplam Kaç Kişilik Menü? *</label>
            <select id="personCount" onchange="generateForms()">
                <option value="1">1 Kişilik</option>
                <option value="2">2 Kişilik</option>
                <option value="3">3 Kişilik</option>
                <option value="4">4 Kişilik</option>
                <option value="5">5 Kişilik</option>
            </select>
        </div>

        <div id="dynamicPersons">
            </div>

        <div class="kvkk">
            <input type="checkbox" required>
            <span>Verilerimin sipariş yönetimi için işlenmesini ve WhatsApp üzerinden iletişimi kabul ediyorum.</span>
        </div>

        <button type="button" class="btn" onclick="sendOrder()">SİPARİŞİ WHATSAPP'A AKTAR</button>
    </form>
</div>

<script>
    // --- BURAYI E-TABLOYA BAĞLAYACAĞIZ ---
    const menuData = {
        corbalar: ["Mercimek", "Domates"],
        anaYemekler: ["Püreli Tavuk", "Musakka", "Fajita", "Nohut"],
        yanlar: ["Pirinç Pilavı", "Bulgur Pilavı", "Erişte"],
        icecekler: ["Ayran", "Cacık", "Salata", "Meyve Suyu"]
    };

    function generateForms() {
        const count = $("#personCount").val();
        const container = $("#dynamicPersons");
        container.empty();

        for (let i = 1; i <= count; i++) {
            container.append(`
                <div class="person-card" data-index="${i}">
                    <span class="person-number">${i}. Kişi Seçimi</span>
                    <div class="menu-grid">
                        <div class="input-group">
                            <label>Çorba</label>
                            <select class="p-corba">${menuData.corbalar.map(x => `<option>${x}</option>`)}</select>
                        </div>
                        <div class="input-group">
                            <label>Ana Yemek</label>
                            <select class="p-ana">${menuData.anaYemekler.map(x => `<option>${x}</option>`)}</select>
                        </div>
                        <div class="input-group">
                            <label>Yan Lezzet</label>
                            <select class="p-yan">${menuData.yanlar.map(x => `<option>${x}</option>`)}</select>
                        </div>
                        <div class="input-group">
                            <label>İçecek/Ek</label>
                            <select class="p-ek">${menuData.icecekler.map(x => `<option>${x}</option>`)}</select>
                        </div>
                    </div>
                </div>
            `);
        }
    }

    function sendOrder() {
        if(!document.getElementById('mainForm').checkValidity()) {
            alert("Lütfen tüm alanları doldurun."); return;
        }

        let orderSummary = `*YENİ SİPARİŞ (Ata Mutfak)*\n`;
        orderSummary += `👤 *Müşteri:* ${$("#custName").val()}\n`;
        orderSummary += `📍 *Adres:* ${$("#custAddress").val()}\n`;
        orderSummary += `👥 *Kişi Sayısı:* ${$("#personCount").val()}\n`;
        orderSummary += `--------------------------\n`;

        $(".person-card").each(function(i) {
            orderSummary += `*${i+1}. Kişi:* ${$(this).find(".p-corba").val()}, ${$(this).find(".p-ana").val()}, ${$(this).find(".p-yan").val()}, ${$(this).find(".p-ek").val()}\n`;
        });

        const telefon = "905077476114";
        window.location.href = "https://wa.me/" + telefon + "?text=" + encodeURIComponent(orderSummary);
    }

    // Sayfa açıldığında ilk formu oluştur
    $(document).ready(() => generateForms());
</script>

</body>
</html>
